<!DOCTYPE html>
<html>
<head>
    <title>The Flower Game Replica</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #topbar {
            font-size: 20px;
            margin-top: 10px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        #game {
            display: grid;
            grid-template-columns: repeat(15, 40px);
            grid-template-rows: repeat(15, 40px);
            gap: 2px;
        }

        .flower {
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .empty {
            background: #222 !important;
            cursor: default;
        }

        #sidebar {
            width: 280px;
            margin-left: 30px;
            padding: 15px;
            background: #1b1b1b;
            border-radius: 8px;
            text-align: left;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #333;
            color: white;
        }

        button:hover {
            background: #555;
        }

        #controls {
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .upgrade {
            margin-top: 10px;
            padding: 8px;
            background: #222;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>The Flower Game Replica🌼</h1>

<div id="topbar">
    🌸 Flowers: <span id="flowers">0</span>
</div>

<div class="container">
    <div id="game"></div>

    <div id="sidebar">
        <h2>🌸 About</h2>
        <p>
            Harvest flowers to earn more flowers.<br>
            Mutations give bonus flowers and spread to nearby plants.
        </p>

        <h2>⬆ Upgrades</h2>

        <div class="upgrade">
            Mutation Chance (+5%)<br>
            Cost: <span id="mutCost">50</span> 🌸<br>
            <button onclick="buyMutation()">Buy</button>
        </div>

        <div class="upgrade">
            Spread Range (+1)<br>
            Cost: <span id="spreadCost">75</span> 🌸<br>
            <button onclick="buySpread()">Buy</button>
        </div>
    </div>
</div>

<div id="controls">
    <button onclick="setPattern('sweden')">Sweden</button>
    <button onclick="setPattern('france')">France</button>
    <button onclick="setPattern('germany')">Germany</button>
    <button onclick="setPattern('random')">🎲 Randomizer</button>
</div>

<script>
const size = 15;
let mutationChance = 0.15;
let spreadRange = 1;
const cooldownTime = 2000;

let flowers = 0;
let mutationCost = 50;
let spreadCost = 75;

const game = document.getElementById("game");
let grid = [];

function updateUI() {
    document.getElementById("flowers").textContent = flowers;
    document.getElementById("mutCost").textContent = mutationCost;
    document.getElementById("spreadCost").textContent = spreadCost;
}

function createEmptyGrid() {
    game.innerHTML = "";
    grid = [];

    for (let y = 0; y < size; y++) {
        grid[y] = [];
        for (let x = 0; x < size; x++) {
            const div = document.createElement("div");
            div.classList.add("flower");
            div.onclick = () => harvest(x, y);
            game.appendChild(div);

            grid[y][x] = {
                element: div,
                color: "#000",
                alive: true,
                mutated: false
            };
        }
    }
}

function setPattern(type) {
    createEmptyGrid();

    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {

            let color = "#000";

            if (type === "sweden") {
                color = "#005293";
                if (x === Math.floor(size/2) || y === Math.floor(size/2))
                    color = "#FECB00";
            }

            if (type === "france") {
                if (x < size/3) color = "#0055A4";
                else if (x < 2*size/3) color = "#FFFFFF";
                else color = "#EF4135";
            }

            if (type === "germany") {
                if (y < size/3) color = "#000000";
                else if (y < 2*size/3) color = "#DD0000";
                else color = "#FFCE00";
            }

            if (type === "random") {
                color = randomColor();
            }

            grid[y][x].color = color;
            grid[y][x].element.style.background = color;
        }
    }
}

function harvest(x, y) {
    const cell = grid[y][x];
    if (!cell.alive) return;

    cell.alive = false;
    cell.element.classList.add("empty");
    cell.element.style.background = "#222";

    let earned = cell.mutated ? 5 : 1;
    flowers += earned;
    updateUI();

    setTimeout(() => regrow(x, y), cooldownTime);
}

function regrow(x, y) {
    const cell = grid[y][x];
    cell.alive = true;

    let newColor = cell.color;
    let mutated = false;

    if (Math.random() < mutationChance) {
        newColor = randomColor();
        mutated = true;
        spreadMutation(x, y, newColor);
    }

    cell.color = newColor;
    cell.mutated = mutated;
    cell.element.classList.remove("empty");
    cell.element.style.background = newColor;
}

function randomColor() {
    const colors = [
        "#ff4d4d",
        "#4dff4d",
        "#4d4dff",
        "#ff66ff",
        "#66ffff",
        "#ffa64d",
        "#ffd700",
        "#00ffcc"
    ];
    return colors[Math.floor(Math.random() * colors.length)];
}

function spreadMutation(x, y, color) {
    for (let dy = -spreadRange; dy <= spreadRange; dy++) {
        for (let dx = -spreadRange; dx <= spreadRange; dx++) {
            let nx = x + dx;
            let ny = y + dy;

            if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                const neighbor = grid[ny][nx];
                if (neighbor.alive) {
                    neighbor.color = color;
                    neighbor.mutated = true;
                    neighbor.element.style.background = color;
                }
            }
        }
    }
}

function buyMutation() {
    if (flowers >= mutationCost) {
        flowers -= mutationCost;
        mutationChance += 0.05;
        mutationCost = Math.floor(mutationCost * 1.7);
        updateUI();
    }
}

function buySpread() {
    if (flowers >= spreadCost) {
        flowers -= spreadCost;
        spreadRange += 1;
        spreadCost = Math.floor(spreadCost * 1.8);
        updateUI();
    }
}

updateUI();
setPattern("sweden");
</script>

</body>
</html>
